<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapHacks</title>
  <link rel="icon" type="image/x-icon" href="images/icons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/general.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/video-hacks.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body id="home" style="background-color: rgba(0, 0, 0, 0.959);">
  <header>
    <nav class="navbar">
      <div class="left-section">
        <a href="index.html"><img class="logo-image" src="images/caphacks-logo.svg" alt="CapHacks Logo"></a>
      </div>

      <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
      <label for="nav-toggle" class="nav-toggle-label">
        <span></span>
      </label>

      <div class="middle-section">
        <input class="search-bar" type="search" placeholder="Want to learn something?" id="search-input">
        <button class="search-button"><i class="fas fa-search"></i></button>
      </div>

      <div class="right-section">
        <div class="auth-buttons" id="authButtons">
          <button class="login-btn" id="loginOpenBtn">Log In</button>
          <button class="signup-btn" id="signupOpenBtn">Sign Up</button>
        </div>
        <div class="user-badge" id="userBadge" hidden>
          <button type="button" class="avatar-btn" id="profileBtn">
            <span class="avatar-ring" id="profileAvatar"><i class="fa-solid fa-user"></i></span>
            <span class="profile-name" id="profileName">User</span>
          </button>
          <div class="profile-dropdown" id="profileDropdown" hidden>
            <a href="#" class="dropdown-item">My Profile</a>
            <a href="video-hacks.html" class="dropdown-item">My Videos</a>
            <button type="button" class="dropdown-item dropdown-signout" id="dropdownSignOutBtn">Sign Out</button>
          </div>
        </div>
      </div>

      <div class="mobile-menu">
        <div class="mobile-actions">
          <button class="login-btn" id="loginOpenMobileBtn">Log In</button>
          <button class="signup-btn" id="signupOpenMobileBtn">Sign Up</button>
          <div class="mobile-user-badge" id="mobileUserBadge" hidden>
            <span class="avatar-ring mobile-avatar" id="mobileProfileAvatar"><i class="fa-solid fa-user"></i></span>
            <span class="profile-name" id="mobileProfileName">User</span>
            <div class="profile-dropdown mobile-dropdown" id="mobileProfileDropdown" hidden>
              <a href="#" class="dropdown-item">My Profile</a>
              <a href="video-hacks.html" class="dropdown-item">My Videos</a>
              <button type="button" class="dropdown-item dropdown-signout" id="mobileDropdownSignOutBtn">Sign Out</button>
            </div>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main>
  <div class="video-grid" id="videoGrid">
    <!-- dito na papasok ang video cards -->
  </div>
</main>

  <div class="modal-overlay" id="authModal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <button class="modal-close" type="button" id="authCloseBtn" aria-label="Close">&times;</button>
      <h2 id="authTitle">Sign In to CapHacks</h2>
      <p>Welcome back! Sign in or create a new account.</p>
      <form class="login-form" id="authForm" data-mode="login">
        <label>
          <span>Email address</span>
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>

        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter your password" required>
        </label>

        <div class="confirm-password-row" id="confirmPasswordRow" style="display:none;">
          <label>
            <span>Confirm password</span>
            <input type="password" name="confirmPassword" placeholder="Confirm your password">
          </label>
        </div>

        <button class="colored-btn" type="submit" id="submitAuthBtn">Sign In</button>

        <div class="login-divider"><span>Or sign in with</span></div>
        <button type="button" class="third-party-btn google-btn" id="googleAuthBtn">Continue with Google</button>
        <button type="button" class="third-party-btn guest-btn" id="guestAuthBtn">Continue as Guest</button>

        <p class="small-text">Don't have an account? <button type="button" class="link-button" id="switchModeBtn" data-target-mode="signup">Sign Up</button></p>
        <div class="login-error" id="authError" role="alert" aria-live="assertive"></div>
      </form>
    </div>
  </div>

  <div class="video-nav-fixed">
    <button class="video-nav-button video-prev-button" aria-label="Previous video"><i class="fas fa-chevron-up"></i></button>
    <button class="video-nav-button video-next-button" aria-label="Next video"><i class="fas fa-chevron-down"></i></button>
  </div>

  <!-- Admin Upload Modal -->
<div class="modal-overlay" id="uploadModal" aria-hidden="true">
  <div class="modal-content" role="dialog">
    <button class="modal-close" type="button" id="uploadCloseBtn">&times;</button>
    <h2>Upload Tutorial</h2>

    <div class="upload-form">
      <label>
        <span>Title</span>
        <input type="text" id="uploadTitle" placeholder="e.g. 01 // Smooth Velocity" required>
      </label>

      <label>
        <span>Description</span>
        <textarea id="uploadDescription" placeholder="Short description ng tutorial..." rows="3"></textarea>
      </label>

      <label>
        <span>Category</span>
        <select id="uploadCategory">
          <option value="Basic">Basic</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advance">Advance</option>
        </select>
      </label>

      <label>
        <span>Video File</span>
        <input type="file" id="uploadFile" accept="video/mp4,video/mov">
      </label>

      <div id="uploadProgress" style="display:none;">
        <p id="uploadStatus">Uploading...</p>
        <progress id="uploadBar" value="0" max="100" style="width:100%"></progress>
      </div>

      <button class="colored-btn" id="uploadSubmitBtn">Upload Video</button>
      <div class="login-error" id="uploadError"></div>
    </div>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js" defer></script>
  <script src="js/video-hacks.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/cookies.js"></script>
</body>
</html>
